<div class="page-container page-container--narrow">
  <button mat-button class="back-btn" type="button" (click)="goBack()">
    <app-lucide-icon name="arrow-left" [size]="20" />
    Volver
  </button>

  <mat-card class="form-card">
    <h1 class="page-title">Registrar Nueva Mascota</h1>
    <p class="page-subtitle">Completa la información de tu mascota para crear su perfil médico</p>

    <form (submit)="handleSubmit($event)">
      <div class="upload-zone">
        <app-lucide-icon name="upload" [size]="48" color="#64748B" />
        <p>Subir fotografía de tu mascota</p>
        <span>PNG, JPG hasta 5MB</span>
      </div>

      <div class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Nombre</mat-label>
          <input matInput required [ngModel]="formData().name" (ngModelChange)="handleChange('name', $event)" name="name" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Especie</mat-label>
          <mat-select required [ngModel]="formData().species" (ngModelChange)="handleChange('species', $event)" name="species">
            <mat-option value="perro">Perro</mat-option>
            <mat-option value="gato">Gato</mat-option>
            <mat-option value="ave">Ave</mat-option>
            <mat-option value="conejo">Conejo</mat-option>
            <mat-option value="otro">Otro</mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Raza</mat-label>
          <input matInput required [ngModel]="formData().breed" (ngModelChange)="handleChange('breed', $event)" name="breed" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Edad</mat-label>
          <input matInput required placeholder="Ej: 3 años" [ngModel]="formData().age" (ngModelChange)="handleChange('age', $event)" name="age" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Sexo</mat-label>
          <mat-select required [ngModel]="formData().sex" (ngModelChange)="handleChange('sex', $event)" name="sex">
            <mat-option value="macho">Macho</mat-option>
            <mat-option value="hembra">Hembra</mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Peso</mat-label>
          <input matInput required placeholder="Ej: 15 kg" [ngModel]="formData().weight" (ngModelChange)="handleChange('weight', $event)" name="weight" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-span">
          <mat-label>Vacunas Aplicadas</mat-label>
          <textarea matInput rows="3" placeholder="Lista de vacunas que tiene tu mascota..." [ngModel]="formData().vaccines" (ngModelChange)="handleChange('vaccines', $event)" name="vaccines"></textarea>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-span">
          <mat-label>Alergias o Condiciones Médicas</mat-label>
          <textarea matInput rows="3" placeholder="Describe cualquier alergia o condición médica conocida..." [ngModel]="formData().allergies" (ngModelChange)="handleChange('allergies', $event)" name="allergies"></textarea>
        </mat-form-field>
      </div>

      <div class="form-actions">
        <button mat-stroked-button type="button" (click)="goBack()">
          <app-lucide-icon name="x" [size]="18" />
          Cancelar
        </button>
        <button mat-flat-button class="btn-primary" type="submit">
          <app-lucide-icon name="save" [size]="18" />
          Guardar Mascota
        </button>
      </div>
    </form>
  </mat-card>
</div>
